<script>

/* =========================
SLIDER
========================= */

let slides =
document.querySelectorAll(".slide");

let index = 0;

setInterval(() => {

slides[index]
.classList.remove("active");

index = (index + 1)
% slides.length;

slides[index]
.classList.add("active");

},4000);

/* =========================
MOBILE MENU
========================= */

const menuBtn =
document.getElementById("menuBtn");

const nav =
document.getElementById("nav");

menuBtn.onclick = () => {

nav.classList.toggle("active");

}

</script>
