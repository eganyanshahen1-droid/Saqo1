<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Royal Catering</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:'Montserrat',sans-serif;
color:white;
display:flex;
justify-content:center;
padding:40px 20px;
}

.container{
width:100%;
max-width:850px;
background:#0c0c0c;
border:1px solid rgba(255,215,120,0.1);
border-radius:35px;
padding:50px;
}

.top-text{
text-align:center;
margin-bottom:45px;
}

.top-text h1{
font-size:70px;
font-family:'Cinzel',serif;
color:#fff2b6;
line-height:1.1;
}

.top-text p{
margin-top:20px;
color:#aaa;
}

form{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.input-box{
display:flex;
flex-direction:column;
}

.input-box label{
margin-bottom:10px;
font-size:13px;
letter-spacing:2px;
color:#f6d365;
font-weight:700;
}

.input-box input,
.input-box textarea,
.input-box select{
padding:18px;
border:none;
border-radius:18px;
background:#161616;
color:white;
outline:none;
}

textarea{
height:180px;
resize:none;
}

.full{
grid-column:1/3;
}

.btn{
grid-column:1/3;
height:70px;
border:none;
border-radius:50px;
cursor:pointer;
font-weight:800;
letter-spacing:4px;
background:linear-gradient(135deg,#d4af37,#f6d365,#fff2b0);
}

@media(max-width:768px){

form{
grid-template-columns:1fr;
}

.full{
grid-column:auto;
}

.btn{
grid-column:auto;
}

.top-text h1{
font-size:45px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="top-text">

<h1>
ROYAL<br>
CATERING
</h1>

<p>
Luxury Japanese catering reservation.
</p>

</div>

<form action="send.php" method="POST">

<div class="input-box">
<label>FULL NAME</label>
<input type="text" name="fullname" required placeholder="Enter your full name" title="Full name">
</div>

<div class="input-box">
<label>PHONE NUMBER</label>
<input type="text" name="phone" required placeholder="Enter your phone number" title="Phone number">
</div>

<div class="input-box">
<label>EMAIL ADDRESS</label>
<input type="email" name="email" required placeholder="Enter your email address" title="Email address">
</div>

<div class="input-box">
<label>NUMBER OF GUESTS</label>

<select name="guests" title="Number of guests">
<option value="" disabled selected>Select guest count</option>
<option>10 Guests</option>
<option>20 Guests</option>
<option>50 Guests</option>
</select>

</div>

<div class="input-box full">
<label>SPECIAL REQUESTS</label>
<textarea name="message" placeholder="Enter any special requests" title="Special requests"></textarea>
</div>

<button type="submit" class="btn">
RESERVE IMPERIAL EXPERIENCE
</button>

</form>

</div>

</body>
</html>
