 <!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GEKKO • IMPERIAL RESERVE</title>

<link rel="icon" href="./images/logo.jpg">
<link rel="stylesheet" href="catering.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">



</head>

<body>

<div class="ultra-box">

<div class="border1"></div>
<div class="border2"></div>
<div class="border3"></div>

<a href="index.html" class="close-btn">✕</a>

<div class="top">

<div class="mini">
GEKKO SUSHI • IMPERIAL RESERVE EXPERIENCE
</div>

<h1>ROYAL CATERING</h1>

<div class="gold-line"></div>

<p>
An elite Japanese dining ceremony designed for luxury weddings,
private royal dinners, VIP celebrations and unforgettable experiences.
Every detail is crafted with elegance, prestige and perfection.
</p>

</div>

<form onsubmit="sendOrder(event)">

<div class="grid">

<div>
<label>FULL NAME</label>
<input type="text" required placeholder="Enter your full name">
</div>
 <div>
<label>PHONE NUMBER</label>
<input type="text" required placeholder="+374 00 000000">
</div>

<div>
<label>EMAIL ADDRESS</label>
<input type="email" required placeholder="example@gmail.com">
</div>

<div>
<label>COMPANY NAME</label>
<input type="text" placeholder="Optional">
</div>

<div>
<label for="guest-count">NUMBER OF GUESTS</label>
<select id="guest-count" title="Number of guests">
<option>10 Guests</option>
<option>20 Guests</option>
<option>30 Guests</option>
<option>50 Guests</option>
<option>100+ Guests</option>
</select>
</div>

<div>
<label for="service-type">SERVICE TYPE</label>
<select id="service-type" title="Service type">
<option>Luxury Delivery</option>
<option>Private On-site Experience</option>
</select>
</div>

<div>
<label for="event-date">EVENT DATE</label>
<input type="date" id="event-date" title="Event date">
</div>

<div>
<label for="event-time">EVENT TIME</label>
<input type="time" id="event-time" title="Event time">
</div>

<div class="full">
<label for="event-type">EVENT TYPE</label>
<select id="event-type" title="Event type">
<option>Royal Wedding</option>
<option>VIP Business Event</option>
<option>Luxury Birthday Celebration</option>
<option>Private Imperial Dinner</option>
<option>Exclusive VIP Party</option>
</select>
</div>

<div class="full">
<label>SPECIAL REQUESTS</label>
<textarea placeholder="Describe your dream imperial catering experience..."></textarea>
</div>

<div class="full checkbox">
</div>

<div class="full">

<button class="btn" type="submit">
RESERVE IMPERIAL EXPERIENCE
</button>

</div>

</div>

</form>

</div>

<script>

function sendOrder(e){

    e.preventDefault();

    alert("👑 Imperial Reservation Sent!");

}

</script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  emailjs.init("yYBEQsEeNxG8GpiKm");

  function sendOrder(e) {
    e.preventDefault();

    const btn = document.querySelector(".btn");
    btn.textContent = "SENDING...";
    btn.disabled = true;

    const inputs = document.querySelectorAll("input, select, textarea");

    const params = {
      from_name: inputs[0].value,
      phone:     inputs[1].value,
      email:     inputs[2].value,
      company:   inputs[3].value,
      guests:    document.getElementById("guest-count").value,
      service:   document.getElementById("service-type").value,
      date:      document.getElementById("event-date").value,
      time:      document.getElementById("event-time").value,
      event:     document.getElementById("event-type").value,
      message:   document.querySelector("textarea").value,
    };

    emailjs.send("service_mruv796", "template_zhftytl", params)
      .then(() => {
        btn.textContent = "✓ RESERVATION SENT";
        btn.style.background = "linear-gradient(135deg, #2d6a2d, #4CAF50)";
        e.target.reset();
      })
      .catch((err) => {
        console.error(err);
        btn.textContent = "✕ ERROR — TRY AGAIN";
        btn.style.background = "linear-gradient(135deg, #8b0000, #c0392b)";
        btn.disabled = false;
      });
  }
</script>
</body>

</html>
