   <style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: Arial, sans-serif;
}

/* HEADER */
.header {
position: absolute;
width: 100%;
padding: 20px;
display: flex;
justify-content: space-between;
color: white;
z-index: 10;
}

.logo {
font-weight: bold;
letter-spacing: 2px;
}

/* HERO */
.gallery-hero {
position: relative;
height: 80vh;
}

.gallery-hero img {
width: 100%;
height: 100%;
object-fit: cover;
}

.gallery-title {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
font-size: 60px;
color: white;
letter-spacing: 5px;
}

/* GRID */
.gallery-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 5px;
}

.gallery-grid img {
width: 100%;
height: 220px;
object-fit: cover;
cursor: pointer;
transition: 0.4s;
}

.gallery-grid img:hover {
transform: scale(1.05);
opacity: 0.8;
}

/* POPUP */
.popup {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.95);
display: none;
justify-content: center;
align-items: center;
z-index: 1000;
}

.popup img {
max-width: 90%;
max-height: 90%;
}

.close {
position: absolute;
top: 20px;
right: 30px;
font-size: 40px;
color: white;
cursor: pointer;
}

/* RESPONSIVE */
@media(max-width: 800px){
.gallery-grid {
grid-template-columns: 1fr 1fr;
}
}

@media(max-width: 500px){
.gallery-grid {
grid-template-columns: 1fr;
}
}
/* RESPONSIVE IMPROVED */

/* Tablet */
@media(max-width: 800px){

    .header {
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 15px;
    }

    .gallery-title {
        font-size: 40px;
        letter-spacing: 3px;
    }

    .gallery-grid {
        grid-template-columns: 1fr 1fr;
    }

    .gallery-grid img {
        height: 180px;
    }
}

/* Mobile */
@media(max-width: 500px){

    .header {
        padding: 10px;
    }

    .logo {
        font-size: 18px;
    }

    .gallery-title {
        font-size: 28px; /* շատ կարևոր */
        letter-spacing: 2px;
        text-align: center;
        width: 90%;
    }

    .gallery-hero {
        height: 60vh; /* փոքրացնում ենք */
    }

    .gallery-grid {
        grid-template-columns: 1fr;
    }

    .gallery-grid img {
        height: 160px;
    }

    .close {
        font-size: 30px;
        top: 10px;
        right: 15px;
    }
}
/* MOBILE NAV FIX */
@media (max-width: 600px){

  .header {
    display: flex;
    flex-direction: row; /* ԱՄԵՆԱԿԱՐԵՎՈՐ */
    justify-content: space-between;
    align-items: center;
    padding: 10px 15px;
  }

  .nav {
    display: flex;
    flex-direction: row; /* որ լինեն կողք կողքի */
    flex-wrap: wrap; /* եթե տեղ չլինի, իջնի հաջորդ տող */
    justify-content: center;
  }

  .nav a {
    margin: 5px 10px;
    font-size: 13px;
  }

  .logo {
    font-size: 14px;
  }
}
</style>

<style>
/* BACKGROUND */
.modal {
display: none;
position: fixed;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.85);
justify-content: center;
align-items: center;
z-index: 999;
}
/* POPUP */
.modal-box {
width: 420px;
padding: 40px;
border-radius: 14px;
background: linear-gradient(145deg, #0f0f0f, #1c1c1c);
box-shadow: 0 0 40px rgba(212,175,55,0.2);
color: white;
text-align: center;
position: relative;
animation: fadeIn 0.4s ease;
}
/* GOLD BORDER EFFECT */
.modal-box::before {
content: "";
position: absolute;
inset: 0;
border-radius: 14px;
padding: 1px;
background: linear-gradient(45deg, gold, transparent, gold);
-webkit-margin-bottom-collapse:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite: xor;
mask-composite: exclude;
}
/* CLOSE */
.close {
position: absolute;
right: 15px;
top: 10px;
font-size: 26px;
cursor: pointer;
color: #ffffff;
}
.close:hover {
color: gold;
}
/* TEXT */
.modal-box h2 {
margin-bottom: 10px;
letter-spacing: 1px;
}
.sub {
font-size: 14px;
color: #ffffff;
margin-bottom: 25px;
}
/* INPUT */
.modal-box input {
width: 100%;
padding: 12px;
margin-bottom: 15px;
border: 1px solid #333;
border-radius: 8px;
background: #111;
color: white;
}
/* MAIN BUTTON */
.main-btn {
width: 100%;
padding: 12px;
border-radius: 30px;
border: none;
background: linear-gradient(45deg, gold, #000000);
color: black;
font-weight: bold;
cursor: pointer;
transition: 0.3s;
}
.main-btn:hover {
transform: scale(1.05);
}
/* DIVIDER */
.divider {
margin: 20px 0;
position: relative;
}
.divider span {
background: #111;
padding: 0 10px;
color: #888;
}
.divider::before {
content: "";
position: absolute;
width: 100%;
height: 1px;
background: #333;
top: 50%;
}
/* SOCIAL */
.social-btn {
width: 100%;
padding: 10px;
margin: 6px 0;
border: 1px solid #333;
background: transparent;
color: white;
border-radius: 8px;
cursor: pointer;
transition: 0.3s;
}
.social-btn:hover {
border-color: gold;
color: gold;
}
/* BOTTOM */
.bottom {
margin-top: 15px;
font-size: 13px;
color: #aaa;
}
.bottom span {
color: gold;
cursor: pointer;
}
/* BUTTON */
.open-btn {
padding: 10px 20px;
background: black;
color: gold;
border: 1px solid gold;
cursor: pointer;
}
/* ANIMATION */
@keyframes fadeIn {
from {opacity: 0; transform: scale(0.85);}
to {opacity: 1; transform: scale(1);}
}
</style>

}
